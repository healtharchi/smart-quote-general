<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>スマート見積（汎用版）｜HEALTH ARCHI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      navy: '#1B2B4B', orange: '#F08300', cta: '#C85400', ctad: '#A84500',
      danger: '#B91C1C', canvas: '#F8FAFC'
    } } }
  };
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<style>
  body { font-family: 'Noto Sans JP','Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; font-size:18px; line-height:1.6; color:#1B2B4B; background:#F8FAFC; }
  .num { font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  @media print {
    body { background: white; font-size: 11pt; }
    .no-print { display: none !important; }
    .print-page-break { break-before: page; page-break-before: always; }
    .print-avoid-break { break-inside: avoid; page-break-inside: avoid; }
    table { page-break-inside: auto; }
    tr { page-break-inside: avoid; }
    thead { display: table-header-group; }
  }
</style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo, createContext, useContext } = React;
const LS_KEY = "ha_general_quote_v2";
const LS_KEY_V1 = "ha_general_quote_v1";

const UNIT_OPTIONS = ["式","㎡","m","m²","本","枚","箇所","台","個","面","帖","坪","ヶ月","日","人工","kg","㎥","セット","回","部屋","ヶ所"];

const SAMPLE_TEMPLATE_SOURCE = [
  { name: "仮設・養生工事", items: [
    { name: "仮設足場", unit: "㎡" }, { name: "養生・防塵シート", unit: "式" },
    { name: "現場片付け・清掃", unit: "式" }, { name: "廃材運搬・処分費", unit: "式" },
  ]},
  { name: "解体・撤去工事", items: [
    { name: "既存内装撤去", unit: "式" }, { name: "既存設備撤去", unit: "式" }, { name: "解体廃材処分", unit: "式" },
  ]},
  { name: "内装工事", items: [
    { name: "クロス張替え", unit: "㎡" }, { name: "床材張替え（フローリング/CF）", unit: "㎡" }, { name: "巾木・廻り縁", unit: "m" },
  ]},
  { name: "水まわり設備", items: [
    { name: "システムキッチン", unit: "台" }, { name: "ユニットバス", unit: "台" },
    { name: "洗面化粧台", unit: "台" }, { name: "トイレ", unit: "台" },
  ]},
  { name: "電気工事", items: [
    { name: "配線・配管", unit: "式" }, { name: "スイッチ・コンセント", unit: "箇所" }, { name: "照明器具", unit: "式" },
  ]},
  { name: "諸経費", items: [
    { name: "現場管理費", unit: "式" }, { name: "一般管理費", unit: "式" },
  ]},
];

// ============ ユーティリティ ============
function uuid() { return 'id-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now().toString(36); }
function nowISO() { return new Date().toISOString(); }
function fmt(n) { if (n === null || n === undefined || isNaN(n)) return "—"; return Math.round(n).toLocaleString('ja-JP'); }
function fmtDate(iso) { return iso ? iso.slice(0, 10) : ""; }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function cleanClientName(name) { if (!name) return ''; return String(name).replace(/[\s　]*(様|さま|サマ|殿|御中)$/, '').trim(); }
function codeFromNumber(n) { let s = ''; while (n > 0) { n--; s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26); } return s; }
function nextAvailableCategoryCode(usedCodes) {
  const used = new Set((usedCodes || []).map(c => String(c).toUpperCase()));
  for (let i = 1; i < 10000; i++) { const code = codeFromNumber(i); if (!used.has(code)) return code; }
  return 'X' + Date.now().toString(36).toUpperCase();
}
function nextInvoiceNo(invoices) {
  const ymd = todayISO().replace(/-/g, '');
  const seq = (invoices || []).filter(iv => (iv.invoiceNo || '').startsWith(ymd)).length + 1;
  return `${ymd}-${String(seq).padStart(2, '0')}`;
}
function makeSampleTemplate() {
  return { id: uuid(), name: 'リフォーム標準（サンプル）',
    categories: SAMPLE_TEMPLATE_SOURCE.map(c => ({ name: c.name, items: c.items.map(it => ({ name: it.name, spec: '', unit: it.unit || '式', price: '' })) })),
    createdAt: nowISO(), updatedAt: nowISO() };
}
function applyTemplateToLines(existingLines, template) {
  const used = new Set((existingLines || []).map(l => l.group));
  const added = [];
  (template.categories || []).forEach(cat => {
    const group = nextAvailableCategoryCode([...used]); used.add(group);
    (cat.items || []).forEach(it => { added.push({ id: uuid(), group, categoryName: cat.name, name: it.name || '', spec: it.spec || '', quantity: '', unit: it.unit || '式', price: (it.price ?? ''), enabled: true }); });
  });
  return [...(existingLines || []), ...added];
}
function linesToTemplateCategories(lines) {
  return groupLines(lines).map(g => ({ name: g.categoryName, items: g.items.map(it => ({ name: it.name, spec: it.spec, unit: it.unit, price: it.price })) }));
}
function computeEstimate(est) {
  const lines = (est.lines || []).map(l => {
    const qty = (l.quantity === '' || l.quantity == null) ? null : (parseFloat(l.quantity) || 0);
    const price = (l.price === '' || l.price == null) ? null : (parseFloat(l.price) || 0);
    const hasValue = qty != null && price != null;
    const amount = (l.enabled && hasValue) ? Math.round(qty * price) : 0;
    return { ...l, qtyNum: qty, priceNum: price, amount };
  });
  const counters = {};
  lines.forEach(l => { if (!l.enabled) { l.displayNo = ''; return; } counters[l.group] = (counters[l.group] || 0) + 1; l.displayNo = `${l.group}-${counters[l.group]}`; });
  const subtotal = lines.reduce((s, l) => s + l.amount, 0);
  const taxRate = est.taxRate != null ? est.taxRate : 10;
  const tax = Math.round(subtotal * taxRate / 100);
  return { lines, subtotal, taxRate, tax, total: subtotal + tax };
}
function groupLines(lines) {
  const order = []; const map = {};
  (lines || []).forEach(l => {
    if (!map[l.group]) { map[l.group] = { group: l.group, categoryName: l.categoryName, total: 0, items: [] }; order.push(l.group); }
    map[l.group].categoryName = l.categoryName; map[l.group].items.push(l);
    if (typeof l.amount === 'number') map[l.group].total += l.amount;
  });
  return order.map(g => map[g]);
}
function emptyCompany() { return { name: '', address: '', phone: '', email: '', representative: '', stampImage: '', bankName: '', bankBranch: '', accountType: '普通', accountNumber: '', accountHolder: '' }; }

// ============ Storage（v2＋v1移行） ============
function migrateV1() {
  try {
    const raw = localStorage.getItem(LS_KEY_V1); if (!raw) return null;
    const old = JSON.parse(raw);
    const properties = []; const estimates = [];
    (old.projects || []).forEach(p => {
      const prop = { id: uuid(), name: p.name || cleanClientName(p.clientName) || '無題の物件', clientName: p.clientName || '', siteAddress: p.siteAddress || '', memo: '', createdAt: p.createdAt || nowISO(), updatedAt: nowISO() };
      properties.push(prop);
      estimates.push({ id: uuid(), propertyId: prop.id, name: p.name || '見積', workType: p.workType || '', staffName: p.staffName || '', estimateDate: p.estimateDate || todayISO(), validUntil: p.validUntil || '', memo: p.memo || '', taxRate: p.taxRate != null ? p.taxRate : 10, printFormat: p.printFormat || 'standard', status: 'draft', confirmedAt: null, lines: p.lines || [], createdAt: p.createdAt || nowISO(), updatedAt: nowISO() });
    });
    return { properties, estimates, invoices: [], templates: old.templates || [makeSampleTemplate()], companyInfo: { ...emptyCompany(), ...(old.companyInfo || {}) } };
  } catch (e) { return null; }
}
function loadAll() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      p.properties = p.properties || []; p.estimates = p.estimates || []; p.invoices = p.invoices || [];
      p.templates = p.templates || [makeSampleTemplate()]; p.companyInfo = { ...emptyCompany(), ...(p.companyInfo || {}) };
      return p;
    }
    const migrated = migrateV1();
    if (migrated) return migrated;
  } catch (e) {}
  return { properties: [], estimates: [], invoices: [], templates: [makeSampleTemplate()], companyInfo: emptyCompany() };
}
function saveAll(state) { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) { console.error(e); } }
function downloadJson(obj, filename) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url);
}

// ============ モーダル ============
const UI = createContext(null);
function useUI() { return useContext(UI); }
function ModalProvider({ children }) {
  const [modal, setModal] = useState(null);
  const [field, setField] = useState('');
  const confirmAsk = (opts) => new Promise(res => setModal({ kind: 'confirm', resolve: res, ...opts }));
  const promptAsk = (opts) => new Promise(res => { setField(opts.defaultValue || ''); setModal({ kind: 'prompt', resolve: res, ...opts }); });
  const close = (val) => { if (modal) modal.resolve(val); setModal(null); };
  return (
    <UI.Provider value={{ confirm: confirmAsk, prompt: promptAsk }}>
      {children}
      {modal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4 no-print" onClick={() => close(modal.kind === 'confirm' ? false : null)}>
          <div className="bg-white rounded-xl p-6 max-w-md w-full shadow-2xl" onClick={e => e.stopPropagation()}>
            <h2 className="text-xl font-bold text-navy mb-2">{modal.title}</h2>
            {modal.message && <p className="text-slate-600 mb-4 text-[16px] whitespace-pre-line">{modal.message}</p>}
            {modal.kind === 'prompt' && (
              <input autoFocus value={field} onChange={e => setField(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && field.trim()) close(field.trim()); }}
                placeholder={modal.placeholder || ''}
                className="w-full px-3 py-2.5 border-2 border-slate-300 rounded-lg text-[17px] focus:outline-none focus:border-navy mb-5" />
            )}
            <div className="flex gap-3 justify-end">
              <button onClick={() => close(modal.kind === 'confirm' ? false : null)} className="bg-white border-2 border-navy text-navy font-bold px-5 rounded-lg hover:bg-slate-50" style={{ minHeight: '48px' }}>キャンセル</button>
              {modal.kind === 'confirm' ? (
                <button onClick={() => close(true)} className={`${modal.danger ? 'bg-danger hover:bg-red-800' : 'bg-cta hover:bg-ctad'} text-white font-bold px-5 rounded-lg`} style={{ minHeight: '48px' }}>{modal.confirmLabel || 'OK'}</button>
              ) : (
                <button onClick={() => { if (field.trim()) close(field.trim()); }} className="bg-cta hover:bg-ctad text-white font-bold px-5 rounded-lg" style={{ minHeight: '48px' }}>{modal.confirmLabel || '決定'}</button>
              )}
            </div>
          </div>
        </div>
      )}
    </UI.Provider>
  );
}

// ============ 共通パーツ ============
const inputCls = "mt-1 w-full px-3 py-2.5 border-2 border-slate-300 rounded-lg text-[17px] bg-white focus:outline-none focus:border-navy focus:ring-2 focus:ring-navy/20 disabled:bg-slate-100 disabled:text-slate-500";
const cellInputCls = "w-full px-2 py-2 rounded-lg border border-slate-200 text-[16px] hover:bg-slate-50 focus:bg-white focus:border-navy focus:outline-none disabled:bg-transparent disabled:border-transparent disabled:hover:bg-transparent";
function Field({ label, children, hint }) {
  return (<label className="block"><span className="text-[15px] font-bold text-navy">{label}</span>{children}{hint && <span className="block text-[13px] text-slate-500 mt-0.5">{hint}</span>}</label>);
}
function Header({ view, setView }) {
  const navs = [['properties', '📁 物件一覧'], ['templates', '📋 テンプレート'], ['settings', '⚙️ 設定']];
  const active = ['property', 'estimate', 'invoice'].includes(view.name) ? 'properties' : (view.name === 'template-edit' ? 'templates' : view.name);
  return (
    <header className="bg-navy text-white shadow-md no-print sticky top-0 z-30">
      <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-2 flex-wrap">
        <div className="flex items-center gap-2 min-w-0">
          <span className="font-bold text-lg tracking-wide whitespace-nowrap">HEALTH <span className="text-orange">ARCHI</span></span>
          <span className="text-slate-300 text-sm truncate">｜スマート見積（汎用版）</span>
        </div>
        <div className="flex gap-1.5 items-center flex-wrap">
          <nav className="flex gap-1">
            {navs.map(([id, label]) => (
              <button key={id} onClick={() => setView({ name: id })} className={`px-3 rounded-lg text-[15px] font-bold transition ${active === id ? 'bg-white text-navy' : 'text-slate-200 hover:bg-white/10'}`} style={{ minHeight: '44px' }}>{label}</button>
            ))}
          </nav>
          <a href="guide.html" target="_blank" rel="noopener" className="border border-white/40 hover:bg-white/10 text-white text-sm font-medium px-3 rounded-lg whitespace-nowrap" style={{ minHeight: '44px', display: 'flex', alignItems: 'center', gap: '4px' }}>📖 使い方</a>
        </div>
      </div>
    </header>
  );
}

// ============ App ============
function App() {
  const ui = useUI();
  const [state, setState] = useState(loadAll);
  const [view, setView] = useState({ name: 'properties' });
  useEffect(() => { saveAll(state); }, [state]);

  // 物件
  const addProperty = async () => {
    const name = await ui.prompt({ title: '物件（案件）を登録', message: '物件名・現場名やお客様名など、分かりやすい名前を入力してください。', placeholder: '例）山田様邸 浴室リフォーム / 〇〇ビル 改修' });
    if (!name) return;
    const p = { id: uuid(), name, clientName: '', siteAddress: '', memo: '', createdAt: nowISO(), updatedAt: nowISO() };
    setState(s => ({ ...s, properties: [p, ...s.properties] }));
    setView({ name: 'property', id: p.id });
  };
  const updateProperty = (id, updater) => setState(s => ({ ...s, properties: s.properties.map(p => p.id === id ? { ...updater(p), updatedAt: nowISO() } : p) }));
  const deleteProperty = async (id) => {
    const p = state.properties.find(x => x.id === id);
    const ec = state.estimates.filter(e => e.propertyId === id).length;
    const ok = await ui.confirm({ title: '物件を削除しますか？', message: `「${p?.name || '無題'}」と、ひも付く見積${ec}件・請求書もすべて削除します。元に戻せません。`, danger: true, confirmLabel: '🗑 削除する' });
    if (ok) setState(s => ({ ...s, properties: s.properties.filter(p => p.id !== id), estimates: s.estimates.filter(e => e.propertyId !== id), invoices: s.invoices.filter(iv => iv.propertyId !== id) }));
  };

  // 見積
  const addEstimate = (propertyId) => {
    const prop = state.properties.find(p => p.id === propertyId);
    const e = { id: uuid(), propertyId, name: prop ? (prop.name + ' 見積') : '見積', workType: '', staffName: '', estimateDate: todayISO(), validUntil: '', memo: '', taxRate: 10, printFormat: 'standard', status: 'draft', confirmedAt: null, lines: [], createdAt: nowISO(), updatedAt: nowISO() };
    setState(s => ({ ...s, estimates: [e, ...s.estimates] }));
    setView({ name: 'estimate', id: e.id });
  };
  const updateEstimate = (id, updater) => setState(s => ({ ...s, estimates: s.estimates.map(e => e.id === id ? { ...updater(e), updatedAt: nowISO() } : e) }));
  const duplicateEstimate = (id) => {
    const o = state.estimates.find(e => e.id === id); if (!o) return;
    const c = { ...JSON.parse(JSON.stringify(o)), id: uuid(), name: o.name + '（複製）', status: 'draft', confirmedAt: null, createdAt: nowISO(), updatedAt: nowISO() };
    c.lines = (c.lines || []).map(l => ({ ...l, id: uuid() }));
    setState(s => ({ ...s, estimates: [c, ...s.estimates] }));
  };
  const deleteEstimate = async (id) => {
    const e = state.estimates.find(x => x.id === id);
    const ok = await ui.confirm({ title: '見積を削除しますか？', message: `「${e?.name || '無題'}」を削除します。ひも付く請求書も削除されます。元に戻せません。`, danger: true, confirmLabel: '🗑 削除する' });
    if (ok) setState(s => ({ ...s, estimates: s.estimates.filter(e => e.id !== id), invoices: s.invoices.filter(iv => iv.estimateId !== id) }));
  };
  const confirmEstimate = async (id) => {
    const ok = await ui.confirm({ title: 'この見積を確定しますか？', message: '確定すると内容がロックされます（編集したい時は「確定解除」で戻せます）。確定後に請求書を作成できます。', confirmLabel: '確定する' });
    if (ok) updateEstimate(id, e => ({ ...e, status: 'confirmed', confirmedAt: nowISO() }));
  };
  const unconfirmEstimate = async (id) => {
    const ok = await ui.confirm({ title: '確定を解除しますか？', message: '編集できる状態（下書き）に戻します。作成済みの請求書はそのまま残ります。', confirmLabel: '確定解除' });
    if (ok) updateEstimate(id, e => ({ ...e, status: 'draft' }));
  };

  // 請求書
  const createInvoice = (estimateId) => {
    const existing = state.invoices.find(iv => iv.estimateId === estimateId);
    if (existing) { setView({ name: 'invoice', id: existing.id }); return; }
    const e = state.estimates.find(x => x.id === estimateId); if (!e) return;
    const r = computeEstimate(e);
    const iv = { id: uuid(), estimateId, propertyId: e.propertyId, invoiceNo: nextInvoiceNo(state.invoices), invoiceDate: todayISO(), dueDate: '', note: '上記の通りご請求申し上げます。', lines: JSON.parse(JSON.stringify(e.lines || [])), taxRate: r.taxRate, subtotal: r.subtotal, tax: r.tax, total: r.total, sourceName: e.name, workType: e.workType, createdAt: nowISO(), updatedAt: nowISO() };
    setState(s => ({ ...s, invoices: [iv, ...s.invoices] }));
    setView({ name: 'invoice', id: iv.id });
  };
  const updateInvoice = (id, updater) => setState(s => ({ ...s, invoices: s.invoices.map(iv => iv.id === id ? { ...updater(iv), updatedAt: nowISO() } : iv) }));
  const deleteInvoice = async (id) => {
    const ok = await ui.confirm({ title: '請求書を削除しますか？', message: 'この請求書を削除します。元に戻せません。', danger: true, confirmLabel: '🗑 削除する' });
    if (ok) setState(s => ({ ...s, invoices: s.invoices.filter(iv => iv.id !== id) }));
  };

  // テンプレート
  const applyTemplate = (estimateId, templateId) => { const t = state.templates.find(t => t.id === templateId); if (!t) return; updateEstimate(estimateId, e => ({ ...e, lines: applyTemplateToLines(e.lines, t) })); };
  const saveEstimateAsTemplate = async (estimateId) => {
    const e = state.estimates.find(x => x.id === estimateId); if (!e) return;
    const name = await ui.prompt({ title: 'テンプレートとして保存', message: 'よく使う内訳セットとして登録します。', defaultValue: e.name || 'マイテンプレート', placeholder: '例）浴室リフォーム 標準セット' });
    if (!name) return;
    const t = { id: uuid(), name, categories: linesToTemplateCategories(e.lines), createdAt: nowISO(), updatedAt: nowISO() };
    setState(s => ({ ...s, templates: [t, ...s.templates] }));
    await ui.confirm({ title: '保存しました', message: '「テンプレート」画面で確認・編集できます。', confirmLabel: 'OK' });
  };
  const addTemplate = async () => { const name = await ui.prompt({ title: '新しいテンプレート', placeholder: '例）外壁塗装 標準セット' }); if (!name) return; const t = { id: uuid(), name, categories: [], createdAt: nowISO(), updatedAt: nowISO() }; setState(s => ({ ...s, templates: [t, ...s.templates] })); setView({ name: 'template-edit', id: t.id }); };
  const updateTemplate = (id, updater) => setState(s => ({ ...s, templates: s.templates.map(t => t.id === id ? { ...updater(t), updatedAt: nowISO() } : t) }));
  const duplicateTemplate = (id) => { const o = state.templates.find(t => t.id === id); if (!o) return; const c = { ...JSON.parse(JSON.stringify(o)), id: uuid(), name: o.name + '（複製）', createdAt: nowISO(), updatedAt: nowISO() }; setState(s => ({ ...s, templates: [c, ...s.templates] })); };
  const deleteTemplate = async (id) => { const t = state.templates.find(x => x.id === id); const ok = await ui.confirm({ title: 'テンプレートを削除しますか？', message: `「${t?.name || '無題'}」を削除します。元に戻せません。`, danger: true, confirmLabel: '🗑 削除する' }); if (ok) setState(s => ({ ...s, templates: s.templates.filter(t => t.id !== id) })); };
  const addSampleTemplate = () => setState(s => ({ ...s, templates: [makeSampleTemplate(), ...s.templates] }));

  return (
    <div className="min-h-screen flex flex-col">
      <Header view={view} setView={setView} />
      <main className="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-6">
        {view.name === 'properties' && (
          <PropertyList properties={state.properties} estimates={state.estimates} invoices={state.invoices}
            onOpen={id => setView({ name: 'property', id })} onAdd={addProperty} onDelete={deleteProperty} />
        )}
        {view.name === 'property' && (
          <PropertyDetail property={state.properties.find(p => p.id === view.id)}
            estimates={state.estimates.filter(e => e.propertyId === view.id)}
            invoices={state.invoices.filter(iv => iv.propertyId === view.id)}
            onChange={updater => updateProperty(view.id, updater)}
            onBack={() => setView({ name: 'properties' })}
            onAddEstimate={() => addEstimate(view.id)} onOpenEstimate={id => setView({ name: 'estimate', id })}
            onDuplicateEstimate={duplicateEstimate} onDeleteEstimate={deleteEstimate}
            onOpenInvoice={id => setView({ name: 'invoice', id })} onDeleteInvoice={deleteInvoice} />
        )}
        {view.name === 'estimate' && (() => {
          const est = state.estimates.find(e => e.id === view.id);
          const prop = est ? state.properties.find(p => p.id === est.propertyId) : null;
          const inv = est ? state.invoices.find(iv => iv.estimateId === est.id) : null;
          return <EstimateEditor estimate={est} property={prop} templates={state.templates} companyInfo={state.companyInfo} hasInvoice={!!inv}
            onChange={updater => updateEstimate(view.id, updater)} onApplyTemplate={tid => applyTemplate(view.id, tid)} onSaveAsTemplate={() => saveEstimateAsTemplate(view.id)}
            onConfirm={() => confirmEstimate(view.id)} onUnconfirm={() => unconfirmEstimate(view.id)} onCreateInvoice={() => createInvoice(view.id)}
            onBack={() => setView({ name: 'property', id: est ? est.propertyId : null })} />;
        })()}
        {view.name === 'invoice' && (() => {
          const inv = state.invoices.find(iv => iv.id === view.id);
          const prop = inv ? state.properties.find(p => p.id === inv.propertyId) : null;
          return <InvoiceView invoice={inv} property={prop} companyInfo={state.companyInfo}
            onChange={updater => updateInvoice(view.id, updater)} onDelete={() => deleteInvoice(view.id)}
            onBack={() => setView({ name: 'property', id: inv ? inv.propertyId : null })} />;
        })()}
        {view.name === 'templates' && (
          <TemplateList templates={state.templates} onOpen={id => setView({ name: 'template-edit', id })} onAdd={addTemplate} onAddSample={addSampleTemplate} onDuplicate={duplicateTemplate} onDelete={deleteTemplate} />
        )}
        {view.name === 'template-edit' && (
          <TemplateEditor template={state.templates.find(t => t.id === view.id)} onChange={updater => updateTemplate(view.id, updater)} onBack={() => setView({ name: 'templates' })} />
        )}
        {view.name === 'settings' && <Settings state={state} setState={setState} />}
      </main>
      <footer className="border-t border-slate-200 bg-white text-[13px] text-slate-500 py-3 text-center no-print">
        スマート見積（汎用版） by HEALTH ARCHI ／ データはこの端末のブラウザ内にのみ保存されます（外部送信なし）
      </footer>
    </div>
  );
}

      <h2 className="text-xl font-bold text-navy mb-3">この物件の請求書</h2>
      {invoices.length === 0 ? (
        <div className="bg-white border-2 border-dashed border-slate-300 rounded-xl p-6 text-center text-slate-500 text-[15px]">請求書は、見積を「確定」してから作成できます。</div>
      ) : (
        <div className="space-y-2">
          {invoices.map(iv => (

                <button onClick={() => onOpenInvoice(iv.id)} className="font-bold text-navy hover:underline text-[14px]">開く</button>

// ============ 見積エディタ ============

  const [tab, setTab] = useState('basic');
  if (!estimate) return <div className="text-slate-500">見積が見つかりません。<button onClick={onBack} className="text-navy underline ml-2">戻る</button></div>;
  const est = useMemo(() => computeEstimate(estimate), [estimate]);
  const locked = estimate.status === 'confirmed';
  const docHeader = { ...estimate, clientName: property?.clientName || '', siteAddress: property?.siteAddress || '' };
  return (
    <div className="pb-28">
      <div className="flex items-center gap-3 mb-3 flex-wrap">
        <button onClick={onBack} className="bg-white border-2 border-navy text-navy font-bold px-4 rounded-lg hover:bg-slate-50" style={{ minHeight: '44px' }}>← 物件へ</button>
        <input value={estimate.name} onChange={e => onChange(p => ({ ...p, name: e.target.value }))} disabled={locked}
          className="text-xl font-bold text-navy bg-transparent border-b-2 border-transparent hover:border-slate-300 focus:border-navy focus:outline-none flex-1 min-w-0 disabled:hover:border-transparent" placeholder="見積名" />
      </div>
      <div className="text-[14px] text-slate-500 mb-3">物件：{property?.name || '—'}{property?.clientName ? `（${cleanClientName(property.clientName)} 様）` : ''}</div>

      {/* 状態バー */}
      <div className={`rounded-xl px-4 py-3 mb-4 flex items-center justify-between gap-3 flex-wrap no-print ${locked ? 'bg-green-50 border-2 border-green-200' : 'bg-slate-100'}`}>
        <div className="flex items-center gap-2">
          <span className={`text-[13px] font-bold px-2 py-1 rounded ${locked ? 'bg-green-100 text-green-800' : 'bg-white text-slate-500'}`}>{locked ? '✓ 確定済み（編集ロック中）' : '下書き'}</span>
          {locked && estimate.confirmedAt && <span className="text-[13px] text-slate-500">{fmtDate(estimate.confirmedAt)} 確定</span>}
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          {!locked ? (
            <button onClick={onConfirm} className="bg-cta hover:bg-ctad text-white font-bold px-5 rounded-lg" style={{ minHeight: '48px' }}>✓ この見積を確定する</button>
          ) : (
            <>
              <button onClick={onCreateInvoice} className="bg-cta hover:bg-ctad text-white font-bold px-5 rounded-lg" style={{ minHeight: '48px' }}>{hasInvoice ? '🧾 請求書を開く' : '🧾 請求書を作成'}</button>
              <button onClick={onUnconfirm} className="bg-white border-2 border-navy text-navy font-bold px-4 rounded-lg hover:bg-slate-50" style={{ minHeight: '48px' }}>確定解除</button>
            </>
          )}
        </div>
      </div>

      <div className="flex gap-1 mb-5 border-b-2 border-slate-200 overflow-x-auto">
        {[['basic', '① 基本情報'], ['details', '② 内訳明細'], ['print', '③ 見積書プレビュー']].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)} className={`px-4 py-2.5 text-[16px] font-bold -mb-0.5 border-b-4 transition whitespace-nowrap ${tab === id ? 'border-orange text-navy' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>{label}</button>
        ))}
      </div>
      {tab === 'basic' && <TabBasic estimate={estimate} onChange={onChange} locked={locked} />}
      {tab === 'details' && <TabDetails estimate={estimate} est={est} templates={templates} onChange={onChange} onApplyTemplate={onApplyTemplate} onSaveAsTemplate={onSaveAsTemplate} locked={locked} />}
      {tab === 'print' && <PrintPreview docHeader={docHeader} est={est} companyInfo={companyInfo} onChange={onChange} />}
      {tab !== 'print' && <TotalBar est={est} />}
    </div>
  );
}

// ============ 内訳明細タブ ============
function TabDetails({ estimate, est, templates, onChange, onApplyTemplate, onSaveAsTemplate, locked }) {
  const ui = useUI();
  const [hideUnused, setHideUnused] = useState(false);
  const groups = useMemo(() => groupLines(est.lines), [est.lines]);
  const isEmpty = (estimate.lines || []).length === 0;
  const updateLine = (id, patch) => onChange(p => ({ ...p, lines: p.lines.map(l => l.id === id ? { ...l, ...patch } : l) }));
  const addItem = (group, categoryName) => onChange(p => ({ ...p, lines: [...p.lines, { id: uuid(), group, categoryName, name: '', spec: '', quantity: '', unit: '式', price: '', enabled: true }] }));
  const deleteLine = (id) => onChange(p => ({ ...p, lines: p.lines.filter(l => l.id !== id) }));
  const addCategory = async () => { const name = await ui.prompt({ title: 'カテゴリを追加', message: '工種・分類の名前を入力してください。', placeholder: '例）内装工事' }); if (!name) return; onChange(p => { const used = [...new Set(p.lines.map(l => l.group))]; const group = nextAvailableCategoryCode(used); return { ...p, lines: [...p.lines, { id: uuid(), group, categoryName: name, name: '', spec: '', quantity: '', unit: '式', price: '', enabled: true }] }; }); };
  const renameCategory = async (group, current) => { const name = await ui.prompt({ title: 'カテゴリ名を変更', defaultValue: current, placeholder: 'カテゴリ名' }); if (!name) return; onChange(p => ({ ...p, lines: p.lines.map(l => l.group === group ? { ...l, categoryName: name } : l) })); };
  const deleteCategory = async (group, name) => { const ok = await ui.confirm({ title: 'カテゴリを削除しますか？', message: `「${name}」とその中の項目をすべて削除します。元に戻せません。`, danger: true, confirmLabel: '🗑 削除する' }); if (ok) onChange(p => ({ ...p, lines: p.lines.filter(l => l.group !== group) })); };

  if (locked) {
    return (
      <div>
        <div className="text-[14px] text-green-800 bg-green-50 border border-green-200 rounded-lg px-3 py-2 mb-4">確定済みのため編集できません。変更するには上の「確定解除」を押してください。</div>
        <div className="space-y-4">
          {groups.map(g => (
            <div key={g.group} className="bg-white border-2 border-slate-200 rounded-xl overflow-hidden">
              <div className="flex items-center justify-between px-4 py-3 bg-slate-50 border-b-2 border-slate-200">
                <span className="font-bold text-navy text-[17px]">{g.categoryName}</span>
                <span className="text-[16px] font-bold text-navy num">¥{fmt(g.total)}</span>
              </div>
              <div className="overflow-x-auto"><table className="w-full text-[16px]" style={{ minWidth: '640px' }}>
                <thead><tr className="text-[13px] text-slate-500 border-b border-slate-100"><th className="w-14 py-2 px-1 text-left">No</th><th className="py-2 px-2 text-left">項目名</th><th className="py-2 px-2 text-left">仕様</th><th className="w-20 py-2 px-1 text-right">数量</th><th className="w-14 py-2 px-1 text-center">単位</th><th className="w-24 py-2 px-1 text-right">単価</th><th className="w-28 py-2 px-2 text-right">金額</th></tr></thead>
                <tbody>{g.items.filter(it => it.enabled).map(it => (<tr key={it.id} className="border-b border-slate-50"><td className="px-1 text-[13px] text-slate-400 num">{it.displayNo}</td><td className="px-2">{it.name}</td><td className="px-2 text-slate-600">{it.spec}</td><td className="px-1 text-right num">{it.qtyNum}</td><td className="px-1 text-center">{it.unit}</td><td className="px-1 text-right num">{fmt(it.priceNum)}</td><td className="px-2 text-right num font-bold">¥{fmt(it.amount)}</td></tr>))}</tbody>
              </table></div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  const TemplateBar = (
    <div className="flex items-center gap-2 flex-wrap">
      <select value="" onChange={e => { if (e.target.value) { onApplyTemplate(e.target.value); e.target.value = ''; } }} className="px-3 border-2 border-slate-300 rounded-lg text-[16px] bg-white focus:outline-none focus:border-navy" style={{ minHeight: '48px' }}>
        <option value="">📋 テンプレートを読み込む…</option>
        {templates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
      </select>
      <button onClick={addCategory} className="bg-white border-2 border-navy text-navy font-bold px-4 rounded-lg hover:bg-slate-50" style={{ minHeight: '48px' }}>＋ カテゴリを追加</button>
      {!isEmpty && <button onClick={onSaveAsTemplate} className="text-navy underline font-bold ml-auto text-[15px]">この内訳をテンプレート保存</button>}
    </div>
  );
  if (isEmpty) {
    return (
      <div className="bg-white border-2 border-dashed border-slate-300 rounded-xl p-8 text-center">
        <div className="text-5xl mb-3" aria-hidden="true">📝</div>
        <p className="text-navy font-bold text-[17px] mb-1">内訳はまだ空です</p>
        <p className="text-slate-500 text-[15px] mb-6">登録したテンプレートを読み込むか、カテゴリを自分で追加して作りはじめましょう。</p>
        <div className="flex items-center justify-center">{TemplateBar}</div>
      </div>
    );
  }
  return (
    <div>
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <div className="flex-1 min-w-0">{TemplateBar}</div>
        <label className="flex items-center gap-2 text-[15px] text-slate-600 cursor-pointer select-none"><input type="checkbox" className="w-5 h-5" checked={hideUnused} onChange={e => setHideUnused(e.target.checked)} />未使用の行を隠す</label>
      </div>
      <datalist id="unit-options">{UNIT_OPTIONS.map(u => <option key={u} value={u} />)}</datalist>
      <div className="space-y-4">
        {groups.map(g => {
          const visibleItems = hideUnused ? g.items.filter(it => it.enabled) : g.items;
          if (hideUnused && visibleItems.length === 0) return null;
          return (
            <div key={g.group} className="bg-white border-2 border-slate-200 rounded-xl overflow-hidden">
              <div className="flex items-center justify-between px-4 py-3 bg-slate-50 border-b-2 border-slate-200 gap-2">
                <div className="flex items-center gap-2 min-w-0">
                  <span className="text-[13px] font-mono text-slate-400">{g.group}</span>
                  <button onClick={() => renameCategory(g.group, g.categoryName)} className="font-bold text-navy text-[17px] hover:underline truncate text-left">{g.categoryName}</button>
                </div>
                <div className="flex items-center gap-3 shrink-0">
                  <span className="text-[16px] font-bold text-navy num">¥{fmt(g.total)}</span>
                  <button onClick={() => deleteCategory(g.group, g.categoryName)} className="text-danger underline text-[13px]">削除</button>
                </div>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-[16px]" style={{ minWidth: '720px' }}>

function PrintPreview({ docHeader, est, companyInfo, onChange }) {
  const format = docHeader.printFormat || 'standard';

  const groups = useMemo(() => groupLines(est.lines).filter(g => g.total > 0 && g.items.some(it => it.enabled && it.amount > 0)), [est.lines]);
  const hasData = groups.length > 0;
  return (
    <div className="pb-10">
      <div className="bg-slate-100 rounded-xl px-4 py-3 flex justify-between items-center no-print flex-wrap gap-3 mb-4">

      </div>
      {!companyInfo?.name && <div className="no-print bg-orange/10 border-2 border-orange/40 rounded-lg px-4 py-3 mb-4 text-[15px] text-navy">💡 「⚙️ 設定」で会社名・住所などを登録すると、見積書に自動で表示されます。</div>}
      {!hasData ? (
        <div className="bg-white border-2 border-dashed border-slate-300 rounded-xl p-10 text-center text-slate-500">金額の入った項目がありません。「② 内訳明細」で数量と単価を入力してください。</div>

        )}
        {invoice.note && <div className="mt-4 text-sm text-slate-600 whitespace-pre-line">{invoice.note}</div>}
        <div className="mt-6 text-xs text-slate-500">※ 振込手数料は貴社にてご負担くださいますようお願い申し上げます。</div>
      </div>

      <div className="mt-6 no-print"><a href="#" onClick={e => { e.preventDefault(); onDelete(); }} className="text-danger underline font-bold text-[14px]">この請求書を削除する</a></div>
    </div>
  );
}

// ============ テンプレート ============
function TemplateList({ templates, onOpen, onAdd, onAddSample, onDuplicate, onDelete }) {
  return (
    <div>
      <div className="flex items-center justify-between mb-2 flex-wrap gap-3"><h1 className="text-2xl font-bold text-navy">テンプレート</h1><button onClick={onAdd} className="bg-cta hover:bg-ctad text-white font-bold px-6 rounded-lg" style={{ minHeight: '56px' }}>＋ 新しいテンプレート</button></div>
      <p className="text-[15px] text-slate-600 mb-5">よく使うカテゴリ・項目のセット（単価込みで可）を登録しておくと、見積を作るときにワンタッチで読み込めます。</p>
      {templates.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-16 text-center bg-white border-2 border-dashed border-slate-300 rounded-xl"><div className="text-6xl mb-4" aria-hidden="true">📋</div><h2 className="text-xl font-bold text-navy mb-2">テンプレートがありません</h2><p className="text-slate-600 mb-6 text-[16px]">サンプルから始めるか、自分で新しく作れます。</p><button onClick={onAddSample} className="bg-cta hover:bg-ctad text-white font-bold px-6 rounded-lg" style={{ minHeight: '56px' }}>💡 サンプルテンプレートを入れてみる</button></div>
      ) : (
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {templates.map(t => {
            const catCount = (t.categories || []).length; const itemCount = (t.categories || []).reduce((s, c) => s + (c.items || []).length, 0);
            return (
              <div key={t.id} className="bg-white border-2 border-slate-200 rounded-xl p-4 hover:border-navy/40 transition">
                <button onClick={() => onOpen(t.id)} className="text-left w-full"><div className="font-bold text-navy truncate text-[17px]">{t.name || '（無題）'}</div><div className="text-[14px] text-slate-500 mt-1">{catCount}カテゴリ / {itemCount}項目</div></button>
                <div className="flex gap-3 mt-3 pt-3 border-t border-slate-100 items-center text-[14px]"><button onClick={() => onOpen(t.id)} className="font-bold text-navy hover:underline">編集</button><button onClick={() => onDuplicate(t.id)} className="text-slate-600 hover:text-navy">複製</button><button onClick={() => onDelete(t.id)} className="text-danger underline ml-auto">削除</button></div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
function TemplateEditor({ template, onChange, onBack }) {
  const ui = useUI();
  if (!template) return <div className="text-slate-500">テンプレートが見つかりません。<button onClick={onBack} className="text-navy underline ml-2">一覧へ戻る</button></div>;
  const cats = template.categories || [];
  const addCategory = async () => { const name = await ui.prompt({ title: 'カテゴリを追加', placeholder: '例）内装工事' }); if (!name) return; onChange(t => ({ ...t, categories: [...(t.categories || []), { name, items: [] }] })); };
  const renameCategory = async (ci, current) => { const name = await ui.prompt({ title: 'カテゴリ名を変更', defaultValue: current }); if (!name) return; onChange(t => ({ ...t, categories: t.categories.map((c, i) => i === ci ? { ...c, name } : c) })); };
  const deleteCategory = async (ci, name) => { const ok = await ui.confirm({ title: 'カテゴリを削除しますか？', message: `「${name}」を削除します。元に戻せません。`, danger: true, confirmLabel: '🗑 削除する' }); if (ok) onChange(t => ({ ...t, categories: t.categories.filter((_, i) => i !== ci) })); };
  const addItem = (ci) => onChange(t => ({ ...t, categories: t.categories.map((c, i) => i === ci ? { ...c, items: [...c.items, { name: '', spec: '', unit: '式', price: '' }] } : c) }));
  const updateItem = (ci, ii, patch) => onChange(t => ({ ...t, categories: t.categories.map((c, i) => i === ci ? { ...c, items: c.items.map((it, j) => j === ii ? { ...it, ...patch } : it) } : c) }));
  const deleteItem = (ci, ii) => onChange(t => ({ ...t, categories: t.categories.map((c, i) => i === ci ? { ...c, items: c.items.filter((_, j) => j !== ii) } : c) }));
  return (
    <div>
      <div className="flex items-center gap-3 mb-4 flex-wrap"><button onClick={onBack} className="bg-white border-2 border-navy text-navy font-bold px-4 rounded-lg hover:bg-slate-50" style={{ minHeight: '44px' }}>← テンプレート一覧</button><input value={template.name} onChange={e => onChange(t => ({ ...t, name: e.target.value }))} className="text-xl font-bold text-navy bg-transparent border-b-2 border-transparent hover:border-slate-300 focus:border-navy focus:outline-none flex-1 min-w-0" placeholder="テンプレート名" /></div>
      <p className="text-[15px] text-slate-600 mb-4">カテゴリ・項目（単価を入れておけば標準単価として）が、見積作成時に読み込まれます。数量は見積ごとに入力します。</p>
      <datalist id="unit-options-tpl">{UNIT_OPTIONS.map(u => <option key={u} value={u} />)}</datalist>
      <div className="space-y-4">
        {cats.map((c, ci) => (
          <div key={ci} className="bg-white border-2 border-slate-200 rounded-xl overflow-hidden">
            <div className="flex items-center justify-between px-4 py-3 bg-slate-50 border-b-2 border-slate-200"><button onClick={() => renameCategory(ci, c.name)} className="font-bold text-navy text-[17px] hover:underline truncate text-left">{c.name || '（カテゴリ名なし）'}</button><button onClick={() => deleteCategory(ci, c.name)} className="text-danger underline text-[13px]">カテゴリ削除</button></div>
            <div className="overflow-x-auto"><table className="w-full text-[16px]" style={{ minWidth: '560px' }}>
              <thead><tr className="text-[13px] text-slate-500 border-b border-slate-100"><th className="py-2 px-2 font-bold text-left">項目名</th><th className="py-2 px-2 font-bold text-left">仕様・摘要</th><th className="w-20 py-2 px-1 font-bold text-center">単位</th><th className="w-32 py-2 px-1 font-bold text-right">標準単価（任意）</th><th className="w-10"></th></tr></thead>
              <tbody>{c.items.map((it, ii) => (<tr key={ii} className="border-b border-slate-50">
                <td className="px-1"><input value={it.name} onChange={e => updateItem(ci, ii, { name: e.target.value })} placeholder="項目名" className={cellInputCls + ' min-w-[140px]'} /></td>
                <td className="px-1"><input value={it.spec} onChange={e => updateItem(ci, ii, { spec: e.target.value })} placeholder="—" className={cellInputCls + ' min-w-[120px] text-slate-600'} /></td>
                <td className="px-1"><input list="unit-options-tpl" value={it.unit} onChange={e => updateItem(ci, ii, { unit: e.target.value })} className={cellInputCls + ' text-center'} /></td>
                <td className="px-1"><input type="number" inputMode="numeric" value={it.price} onChange={e => updateItem(ci, ii, { price: e.target.value })} placeholder="—" className={cellInputCls + ' text-right num'} /></td>
                <td className="px-1 text-center"><button onClick={() => deleteItem(ci, ii)} aria-label="この項目を削除" className="text-slate-300 hover:text-danger text-lg w-8 h-8">✕</button></td>
              </tr>))}</tbody>
            </table></div>
            <div className="px-4 py-3 border-t border-slate-100"><button onClick={() => addItem(ci)} className="text-navy font-bold hover:underline text-[15px]">＋ 項目を追加</button></div>
          </div>
        ))}
      </div>
      <button onClick={addCategory} className="mt-4 w-full py-4 border-2 border-dashed border-slate-300 rounded-xl text-navy font-bold hover:border-navy hover:bg-slate-50">＋ 新しいカテゴリを追加</button>
    </div>
  );
}

// ============ 設定 ============
function Settings({ state, setState }) {
  const ui = useUI();
  const setCompany = (key, val) => setState(s => ({ ...s, companyInfo: { ...s.companyInfo, [key]: val } }));
  const exportAll = () => downloadJson({ ...state, _exportedAt: nowISO(), _version: 'general-v2' }, `見積データ_全体_${todayISO()}.json`);
  const importAll = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const obj = JSON.parse(ev.target.result);
        if (!obj.properties && !obj.estimates && !obj.projects) throw new Error('対応していないファイルです');
        const ok = await ui.confirm({ title: '全データを上書きしますか？', message: '現在の物件・見積・請求書・テンプレート・会社情報がファイルの内容で置き換わります。元に戻せません。', danger: true, confirmLabel: '上書きする' });
        if (!ok) return;
        if (obj.projects && !obj.properties) {
          // 旧v1形式の取り込み（移行）
          const props = []; const ests = [];
          obj.projects.forEach(p => { const pr = { id: uuid(), name: p.name || '無題の物件', clientName: p.clientName || '', siteAddress: p.siteAddress || '', memo: '', createdAt: nowISO(), updatedAt: nowISO() }; props.push(pr); ests.push({ id: uuid(), propertyId: pr.id, name: p.name || '見積', workType: p.workType || '', staffName: p.staffName || '', estimateDate: p.estimateDate || todayISO(), validUntil: p.validUntil || '', memo: p.memo || '', taxRate: p.taxRate ?? 10, printFormat: 'standard', status: 'draft', confirmedAt: null, lines: p.lines || [], createdAt: nowISO(), updatedAt: nowISO() }); });
          setState(s => ({ properties: props, estimates: ests, invoices: [], templates: obj.templates || s.templates, companyInfo: { ...emptyCompany(), ...(obj.companyInfo || {}) } }));
        } else {
          setState(s => ({ properties: obj.properties || [], estimates: obj.estimates || [], invoices: obj.invoices || [], templates: obj.templates || s.templates, companyInfo: { ...emptyCompany(), ...(obj.companyInfo || {}) } }));
        }
        await ui.confirm({ title: '取り込みました', confirmLabel: 'OK' });
      } catch (err) { await ui.confirm({ title: '読み込みに失敗しました', message: 'ファイルの形式をご確認ください。\n' + err.message, confirmLabel: 'OK' }); }
    };
    reader.readAsText(file); e.target.value = '';
  };
  const resetAll = async () => {
    const ok1 = await ui.confirm({ title: 'すべてのデータを初期化しますか？', message: '物件・見積・請求書・テンプレート・会社情報をすべて削除します。先にバックアップ（エクスポート）をおすすめします。', danger: true, confirmLabel: '次へ' });
    if (!ok1) return;
    const ok2 = await ui.confirm({ title: '本当に全部消しますか？', message: 'この操作は元に戻せません。', danger: true, confirmLabel: '🗑 すべて消去' });
    if (!ok2) return;
    localStorage.removeItem(LS_KEY); location.reload();
  };
  const onStampFile = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    if (file.size > 500 * 1024) { await ui.confirm({ title: '画像が大きすぎます', message: '500KB以下の画像を使ってください。', confirmLabel: 'OK' }); e.target.value = ''; return; }
    const reader = new FileReader(); reader.onload = ev => setCompany('stampImage', ev.target.result); reader.readAsDataURL(file);
  };
  const c = state.companyInfo || {};
  return (
    <div>
      <h1 className="text-2xl font-bold text-navy mb-5">設定</h1>
      <div className="space-y-5 max-w-3xl">
        <div className="bg-white border-2 border-slate-200 rounded-xl p-5">
          <h2 className="font-bold text-navy mb-3 text-[18px]">会社情報（見積書・請求書に表示されます）</h2>
          <div className="grid sm:grid-cols-2 gap-4">
            <Field label="会社名"><input className={inputCls} value={c.name || ''} onChange={e => setCompany('name', e.target.value)} placeholder="例）株式会社〇〇工務店" /></Field>
            <Field label="代表者"><input className={inputCls} value={c.representative || ''} onChange={e => setCompany('representative', e.target.value)} placeholder="例）佐藤 一郎" /></Field>
            <Field label="住所"><input className={inputCls} value={c.address || ''} onChange={e => setCompany('address', e.target.value)} placeholder="例）〇〇県〇〇市…" /></Field>
            <Field label="電話"><input className={inputCls} inputMode="tel" value={c.phone || ''} onChange={e => setCompany('phone', e.target.value)} placeholder="例）012-345-6789" /></Field>
            <Field label="メールアドレス"><input className={inputCls} inputMode="email" value={c.email || ''} onChange={e => setCompany('email', e.target.value)} placeholder="例）info@example.com" /></Field>
          </div>
          <div className="mt-4 pt-4 border-t border-slate-200">
            <h3 className="font-bold text-navy mb-1 text-[16px]">🖋 印鑑画像（任意・正式見積書／請求書に自動挿入）</h3>
            <p className="text-[13px] text-slate-500 mb-2">透過PNG推奨・500KB以下。</p>
            <div className="flex items-center gap-3 flex-wrap">
              {c.stampImage && <div className="border border-slate-300 rounded p-1 bg-white"><img src={c.stampImage} alt="印鑑" className="h-16 w-16 object-contain" /></div>}
              <input type="file" accept="image/*" onChange={onStampFile} className="text-[14px]" />
              {c.stampImage && <button onClick={() => setCompany('stampImage', '')} className="text-danger underline text-[14px]">画像を削除</button>}
            </div>
          </div>
        </div>

        <div className="bg-white border-2 border-slate-200 rounded-xl p-5">
          <h2 className="font-bold text-navy mb-1 text-[18px]">🏦 振込先（請求書に表示されます）</h2>
          <p className="text-[13px] text-slate-500 mb-3">請求書の「お振込先」欄に自動で表示されます。</p>
          <div className="grid sm:grid-cols-2 gap-4">
            <Field label="銀行名"><input className={inputCls} value={c.bankName || ''} onChange={e => setCompany('bankName', e.target.value)} placeholder="例）〇〇銀行" /></Field>
            <Field label="支店名"><input className={inputCls} value={c.bankBranch || ''} onChange={e => setCompany('bankBranch', e.target.value)} placeholder="例）〇〇支店" /></Field>
            <Field label="口座種別"><select className={inputCls} value={c.accountType || '普通'} onChange={e => setCompany('accountType', e.target.value)}><option value="普通">普通</option><option value="当座">当座</option></select></Field>
            <Field label="口座番号"><input className={inputCls} inputMode="numeric" value={c.accountNumber || ''} onChange={e => setCompany('accountNumber', e.target.value)} placeholder="例）1234567" /></Field>
            <div className="sm:col-span-2"><Field label="口座名義"><input className={inputCls} value={c.accountHolder || ''} onChange={e => setCompany('accountHolder', e.target.value)} placeholder="例）カ）〇〇コウムテン" /></Field></div>
          </div>
        </div>

        <div className="grid sm:grid-cols-2 gap-5">
          <div className="bg-white border-2 border-slate-200 rounded-xl p-5">
            <h2 className="font-bold text-navy mb-1 text-[18px]">📤 バックアップ（エクスポート）</h2>
            <p className="text-[13px] text-slate-500 mb-3">端末のキャッシュ消去でデータが消えるのを防ぐため、定期的な保存をおすすめします。</p>
            <button onClick={exportAll} className="w-full bg-cta hover:bg-ctad text-white font-bold rounded-lg" style={{ minHeight: '48px' }}>全データを保存（バックアップ）</button>
          </div>
          <div className="bg-white border-2 border-slate-200 rounded-xl p-5">
            <h2 className="font-bold text-navy mb-1 text-[18px]">📥 読み込み（インポート）</h2>
            <p className="text-[13px] text-slate-500 mb-3">バックアップしたファイルを読み込みます（全データを上書き）。</p>
            <label className="block"><input type="file" accept=".json" onChange={importAll} className="hidden" /><span className="block w-full text-center bg-white border-2 border-navy text-navy font-bold rounded-lg cursor-pointer hover:bg-slate-50" style={{ minHeight: '48px', lineHeight: '48px' }}>ファイルを選ぶ</span></label>
          </div>
        </div>

        <div className="bg-red-50 border-2 border-red-200 rounded-xl p-5">
          <h2 className="font-bold text-danger mb-2 text-[18px]">⚠️ データ初期化</h2>
          <p className="text-[14px] text-red-800 mb-3">物件・見積・請求書・テンプレート・会社情報をすべて削除します。必ずバックアップしてから実行してください。</p>
          <a href="#" onClick={e => { e.preventDefault(); resetAll(); }} className="text-danger underline font-bold">すべてのデータを初期化する</a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ModalProvider><App /></ModalProvider>);
</script>
